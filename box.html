<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>선물 뽑기</title>

  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      background: #fff8e7;
      margin: 0;
    }

    h1 {
      margin-top: 30px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
      max-width: 800px;
      margin: 40px auto;
    }

    .item {
      text-align: center;
    }

    .box {
      width: 180px;
      height: 180px;
      border: none;
      cursor: pointer;
      background: none;
    }

    .box img {
      width: 100%;
      transition: transform 0.2s;
    }

    .box:hover img {
      transform: scale(1.1);
    }

    .result {
      margin-top: 10px;
      font-size: 22px;
      font-weight: bold;
      height: 30px;
      color: red;
    }

    .code-area {
      margin-top: 10px;
    }

    .code-area input {
      width: 160px;
      padding: 10px;
      font-size: 20px;
      text-align: center;
      border: 2px solid #ccc;
      border-radius: 8px;
    }

    .code-area button {
      padding: 11px 20px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      background-color: #ff9800;
      color: white;
      cursor: pointer;
    }

    .answer {
      margin-top: 15px;
      font-size: 24px;
      font-weight: bold;
      height: 35px;
    }

    .reset-btn {
      margin-top: 20px;
      padding: 12px 25px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      background-color: #4CAF50;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>
  
  <h1>1. 암호코드가 들어있는 박스를 고르세요!</h1>
  <p>코드는 박스 1곳에만 들어있습니다. 찾은 코드를 밑에 입력해주세요. 🎁</p>

  <div class="container" id="container"></div>

  <div class="code-area">
    <input type="text" id="codeInput" maxlength="4" placeholder="숫자 4자리">
    <button onclick="checkCode()">입력</button>
  </div>

  <div class="answer" id="answer"></div>

  <button class="reset-btn" onclick="resetGame()">다시하기</button>

  <script>
    const container = document.getElementById("container");
    const codeInput = document.getElementById("codeInput");
    const answer = document.getElementById("answer");

    let winIndex;
    let clicked;
    let winningCode = "";

    function getRandom4Digit() {
      return String(Math.floor(Math.random() * 10000)).padStart(4, "0");
    }

    function createGame() {
      container.innerHTML = "";
      codeInput.value = "";
      answer.textContent = "";

      winIndex = Math.floor(Math.random() * 3);
      clicked = false;
      winningCode = getRandom4Digit();

      for (let i = 0; i < 3; i++) {
        const item = document.createElement("div");
        item.className = "item";

        const btn = document.createElement("button");
        btn.className = "box";

        const img = document.createElement("img");
        img.src = "box-closed.png";

        const result = document.createElement("div");
        result.className = "result";

        btn.appendChild(img);

        btn.onclick = () => {
          if (clicked) return;

          clicked = true;
          img.src = "box-open.png";

          if (i === winIndex) {
            result.textContent = winningCode;
          } else {
            result.textContent = "꽝!";
            result.style.color = "#555";
          }
        };

        item.appendChild(btn);
        item.appendChild(result);
        container.appendChild(item);
      }
    }

    function checkCode() {
      if (codeInput.value === winningCode) {
        answer.textContent = "정답!";
        answer.style.color = "red";
      } else {
        answer.textContent = "틀렸습니다!";
        answer.style.color = "#555";
      }
    }

    function resetGame() {
      createGame();
    }

    createGame();
  </script>

</body>
</html>
